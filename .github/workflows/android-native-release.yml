name: android-native-release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore keystore (optional)
        id: keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets not configured. Release APK will be skipped."
          else
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app-release.keystore
            echo "ANDROID_KEYSTORE_FILE=$PWD/app-release.keystore" >> "$GITHUB_ENV"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Assemble release (signed)
        if: steps.keystore.outputs.ready == 'true'
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: steps.keystore.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
