name: android-build

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      PRUMO_WEB_CLIENT_DIR: ./prumo-web-client
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout web client
        uses: actions/checkout@v4
        with:
          repository: caio-3htty/prumo-web-client
          path: prumo-web-client

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix ./prumo-web-client ci

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build Android APK
        run: npm run android:build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prumo-android-client-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
