name: android-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell-sync:
    runs-on: ubuntu-latest
    env:
      PROMO_APP_WEB_DIR: ./promo_APP_Web
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout web client
        uses: actions/checkout@v4
        with:
          repository: caio-3htty/promo_APP_Web
          path: promo_APP_Web

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix ./promo_APP_Web ci

      - name: Sync Android shell with embedded web build
        run: npm run android:sync

